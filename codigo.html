<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de proyectos</title>
  <link rel="stylesheet" href="codigo.css">
</head>
<body>

<div class="container">


  <aside class="sidebar">
    <div class="icon">☰</div>
    <div class="icon">📁</div>
    <div class="icon active">📂</div>
    <div class="icon">🕒</div>
  </aside>

  
  <main class="main">
    <div class="header">
      <div>
        <h1>Gestión de proyectos</h1>
        <p>Administra los proyectos que otorgan horas sociales.</p>
      </div>
      <button class="btn">+ Nuevo proyecto</button>
    </div>

    <!-- Cards -->
    <div class="card">
      <div class="info">
        <div class="icon-box">📖</div>
        <div>
          <h3>Biblioteca</h3>
          <p>10 horas &nbsp;&nbsp; 20 cupos</p>
        </div>
      </div>
      <div class="actions">
        <button class="edit">✏️</button>
        <button class="delete">🗑️</button>
      </div>
    </div>

    <div class="card">
      <div class="info">
        <div class="icon-box">👥</div>
        <div>
          <h3>Preescolar</h3>
          <p>15 horas &nbsp;&nbsp; 15 cupos</p>
        </div>
      </div>
      <div class="actions">
        <button class="edit">✏️</button>
        <button class="delete">🗑️</button>
      </div>
    </div>

    <div class="card">
      <div class="info">
        <div class="icon-box">📅</div>
        <div>
          <h3>Eventos escolares</h3>
          <p>5 horas &nbsp;&nbsp; 30 cupos</p>
        </div>
      </div>
      <div class="actions">
        <button class="edit">✏️</button>
        <button class="delete">🗑️</button>
      </div>
    </div>

    <div class="card">
      <div class="info">
        <div class="icon-box">🌱</div>
        <div>
          <h3>Apoyo ambiental</h3>
          <p>8 horas &nbsp;&nbsp; 25 cupos</p>
        </div>
      </div>
      <div class="actions">
        <button class="edit">✏️</button>
        <button class="delete">🗑️</button>
      </div>
    </div>

  </main>
</div>

</body>
</html>
